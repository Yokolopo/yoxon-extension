<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #050816;
      color: #fff;
      margin: 0;
    }
    .logo { color: #00D4C5; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .desc { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 16px; line-height: 1.5; }
    .btn {
      display: block; width: 100%; padding: 10px;
      background: linear-gradient(135deg, #00D4C5, #0EA5E9);
      color: #050816; border: none;
      border-radius: 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; text-align: center; text-decoration: none;
      box-sizing: border-box;
    }
    .btn:hover { opacity: 0.9; }
    .note { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 12px; text-align: center; }
  </style>
</head>
<body>
  <div class="logo">⚡ YOXON</div>
  <p class="desc">Navigate to any LinkedIn job posting to see the "Tailor CV with Yoxon" button appear next to the Apply button.</p>
  <a href="https://yoxon.co/builder" target="_blank" class="btn">Open CV Builder →</a>
  <p class="note">AI-powered CV tailoring · From $4.99</p>
  <script src="popup.js"></script>
</body>
</html>
